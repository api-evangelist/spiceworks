naftiko: 1.0.0-alpha2
info:
  label: Spiceworks Cloud Apps API — Tickets
  description: 'Spiceworks Cloud Apps API — Tickets. 4 operations. Lead operation: List Help Desk Tickets. Self-contained
    Naftiko capability covering one Spiceworks business surface.'
  tags:
  - Spiceworks
  - Tickets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPICEWORKS_API_KEY: SPICEWORKS_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-apps-tickets
    baseUri: https://community.spiceworks.com
    description: Spiceworks Cloud Apps API — Tickets business capability. Self-contained, no shared references.
    resources:
    - name: api-v1-tickets
      path: /api/v1/tickets
      operations:
      - name: listtickets
        method: GET
        description: List Help Desk Tickets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter tickets by status
        - name: assigned_to
          in: query
          type: integer
          description: Filter by assigned technician ID
        - name: page
          in: query
          type: integer
          description: Page number for pagination
        - name: per_page
          in: query
          type: integer
          description: Number of tickets per page
      - name: createticket
        method: POST
        description: Create Help Desk Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-v1-tickets-id
      path: /api/v1/tickets/{id}
      operations:
      - name: getticket
        method: GET
        description: Get Help Desk Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The unique identifier of the ticket
          required: true
      - name: updateticket
        method: PUT
        description: Update Help Desk Ticket
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: integer
          description: The unique identifier of the ticket
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SPICEWORKS_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-apps-tickets-rest
    port: 8080
    description: REST adapter for Spiceworks Cloud Apps API — Tickets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v1/tickets
      name: api-v1-tickets
      description: REST surface for api-v1-tickets.
      operations:
      - method: GET
        name: listtickets
        description: List Help Desk Tickets
        call: cloud-apps-tickets.listtickets
        with:
          status: rest.status
          assigned_to: rest.assigned_to
          page: rest.page
          per_page: rest.per_page
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createticket
        description: Create Help Desk Ticket
        call: cloud-apps-tickets.createticket
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/v1/tickets/{id}
      name: api-v1-tickets-id
      description: REST surface for api-v1-tickets-id.
      operations:
      - method: GET
        name: getticket
        description: Get Help Desk Ticket
        call: cloud-apps-tickets.getticket
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateticket
        description: Update Help Desk Ticket
        call: cloud-apps-tickets.updateticket
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-apps-tickets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Spiceworks Cloud Apps API — Tickets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-help-desk-tickets
      description: List Help Desk Tickets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-apps-tickets.listtickets
      with:
        status: tools.status
        assigned_to: tools.assigned_to
        page: tools.page
        per_page: tools.per_page
      outputParameters:
      - type: object
        mapping: $.
    - name: create-help-desk-ticket
      description: Create Help Desk Ticket
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-apps-tickets.createticket
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-help-desk-ticket
      description: Get Help Desk Ticket
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-apps-tickets.getticket
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-help-desk-ticket
      description: Update Help Desk Ticket
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cloud-apps-tickets.updateticket
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
