naftiko: "1.0.0-alpha1"

info:
  label: "Spiceworks Cloud Apps API"
  description: >-
    Shared capability definition for the Spiceworks Cloud Apps API, providing
    access to Help Desk tickets, inventory devices, and user management for
    IT professionals building embedded cloud applications within the Spiceworks platform.
  tags:
    - Spiceworks
    - Help Desk
    - IT Management
    - Ticketing
    - Inventory
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPICEWORKS_OAUTH_TOKEN: SPICEWORKS_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: spiceworks
      baseUri: https://community.spiceworks.com
      description: "Spiceworks Cloud Apps REST API for IT management and Help Desk"
      authentication:
        type: bearer
        token: "{{SPICEWORKS_OAUTH_TOKEN}}"
      resources:
        - name: tickets
          path: /api/v1/tickets
          description: "Help Desk ticket management"
          operations:
            - name: list-tickets
              method: GET
              description: "Retrieve a list of Help Desk tickets"
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter tickets by status (open, closed, in_progress)"
                - name: assigned_to
                  in: query
                  type: integer
                  required: false
                  description: "Filter by assigned technician ID"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-ticket
              method: POST
              description: "Create a new Help Desk ticket"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  summary: "{{tools.summary}}"
                  description: "{{tools.description}}"
                  priority: "{{tools.priority}}"
        - name: ticket
          path: /api/v1/tickets/{id}
          description: "Individual Help Desk ticket operations"
          operations:
            - name: get-ticket
              method: GET
              description: "Retrieve full details of a specific ticket"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "The ticket ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-ticket
              method: PUT
              description: "Update an existing Help Desk ticket"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "The ticket ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  status: "{{tools.status}}"
                  priority: "{{tools.priority}}"
                  assignee_id: "{{tools.assignee_id}}"
        - name: ticket-comments
          path: /api/v1/tickets/{ticket_id}/comments
          description: "Ticket comment management"
          operations:
            - name: list-comments
              method: GET
              description: "Retrieve all comments for a ticket"
              inputParameters:
                - name: ticket_id
                  in: path
                  type: integer
                  required: true
                  description: "The ticket ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-comment
              method: POST
              description: "Add a comment to a ticket"
              inputParameters:
                - name: ticket_id
                  in: path
                  type: integer
                  required: true
                  description: "The ticket ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  body: "{{tools.body}}"
                  is_public: "{{tools.is_public}}"
        - name: devices
          path: /api/v1/devices
          description: "IT device inventory management"
          operations:
            - name: list-devices
              method: GET
              description: "Retrieve a list of managed IT devices"
              inputParameters:
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Filter by device type"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: device
          path: /api/v1/devices/{id}
          description: "Individual device inventory operations"
          operations:
            - name: get-device
              method: GET
              description: "Retrieve details of a specific device"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "The device ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: users
          path: /api/v1/users
          description: "User and technician management"
          operations:
            - name: list-users
              method: GET
              description: "Retrieve a list of platform users"
              inputParameters:
                - name: role
                  in: query
                  type: string
                  required: false
                  description: "Filter by user role"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: user
          path: /api/v1/users/{id}
          description: "Individual user profile operations"
          operations:
            - name: get-user
              method: GET
              description: "Retrieve a specific user profile"
              inputParameters:
                - name: id
                  in: path
                  type: integer
                  required: true
                  description: "The user ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: spiceworks-rest
      resources:
        - path: /v1/tickets
          name: tickets
          description: "Help Desk ticket collection"
          operations:
            - method: GET
              name: list-tickets
              description: "List Help Desk tickets"
              call: "spiceworks.list-tickets"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-ticket
              description: "Create a new Help Desk ticket"
              call: "spiceworks.create-ticket"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/tickets/{id}
          name: ticket
          description: "Individual ticket operations"
          operations:
            - method: GET
              name: get-ticket
              description: "Get ticket details"
              call: "spiceworks.get-ticket"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-ticket
              description: "Update a ticket"
              call: "spiceworks.update-ticket"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/devices
          name: devices
          description: "Device inventory collection"
          operations:
            - method: GET
              name: list-devices
              description: "List managed devices"
              call: "spiceworks.list-devices"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/devices/{id}
          name: device
          description: "Individual device operations"
          operations:
            - method: GET
              name: get-device
              description: "Get device details"
              call: "spiceworks.get-device"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users
          name: users
          description: "User collection"
          operations:
            - method: GET
              name: list-users
              description: "List platform users"
              call: "spiceworks.list-users"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: spiceworks-mcp
      transport: http
      tools:
        - name: list-tickets
          description: "List Help Desk tickets with optional status and assignee filters"
          hints:
            readOnly: true
            openWorld: true
          call: "spiceworks.list-tickets"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-ticket
          description: "Get full details of a specific Help Desk ticket"
          hints:
            readOnly: true
          call: "spiceworks.get-ticket"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-ticket
          description: "Create a new Help Desk ticket"
          hints:
            readOnly: false
          call: "spiceworks.create-ticket"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-ticket
          description: "Update a Help Desk ticket status, priority or assignee"
          hints:
            readOnly: false
            idempotent: true
          call: "spiceworks.update-ticket"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: add-ticket-comment
          description: "Add a public or internal comment to a Help Desk ticket"
          hints:
            readOnly: false
          call: "spiceworks.add-comment"
          with:
            ticket_id: "tools.ticket_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-devices
          description: "List managed IT devices from inventory"
          hints:
            readOnly: true
            openWorld: true
          call: "spiceworks.list-devices"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-device
          description: "Get hardware, software, and network details for a specific device"
          hints:
            readOnly: true
          call: "spiceworks.get-device"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: "List Spiceworks platform users and technicians"
          hints:
            readOnly: true
            openWorld: true
          call: "spiceworks.list-users"
          outputParameters:
            - type: object
              mapping: "$."
