      - url: rules/spiceworks-rules.yml
        type: SpectralRules
    description: >-
      The Spiceworks Cloud Apps API provides a JavaScript SDK for building integrated apps within the Spiceworks
      platform, with access to Help Desk ticketing data, device inventory, and user information. It allows developers to
      create custom apps embedded in the Spiceworks interface with access to IT management data.
